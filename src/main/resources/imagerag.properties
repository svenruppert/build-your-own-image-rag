# ============================================================
# Build Your Own Image RAG — application configuration
# ============================================================
# This file is loaded from the classpath at startup by AppConfig.
# A JVM system property with the same key overrides any value
# set here (useful for CI / Docker environments).
# ============================================================

# --- Vector-search backend ---------------------------------------------------
#
# Selects which vector-search implementation is active.
#
# Allowed values:
#   in-memory        Existing in-memory cosine-similarity backend (default).
#                    Vectors are re-embedded via Ollama on every restart.
#   gigamap-jvector  EclipseStore-backed raw-vector store (the "GigaMap") combined
#                    with a JVector 4.x HNSW approximate-nearest-neighbour index.
#                    Raw float[] vectors are persisted by EclipseStore so Ollama
#                    is NOT required during application restarts.
#
vector.backend=gigamap-jvector
#vector.backend=in-memory

# --- Embedding model -----------------------------------------------------------
#
# Selects the Ollama embedding model used for semantic search.
# Changing this requires a vector index rebuild so that all stored vectors are
# produced by the same model.  Use the "Rebuild Vector Index" button in the
# Pipeline view after switching.
#
embedding.model=bge-m3

# --- Search defaults ----------------------------------------------------------
#
# Minimum RRF score a result must reach to appear in the search results page.
# Values between 0.5 (lenient) and 0.8 (strict) make practical sense.
#
search.min.score=0.65

# --- Taxonomy defaults --------------------------------------------------------
#
# Images whose category-confidence primary score is below this value are included
# when the LOW_CONFIDENCE analysis scope is selected.
# Values between 0.4 (very lenient) and 0.75 (strict) make practical sense.
#
taxonomy.confidence.threshold=0.60
