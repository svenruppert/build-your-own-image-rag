# ── Learning Modules ───────────────────────────────────────────────────────────
dashboard.modules.title=Training Modules
dashboard.modules.desc=Six self-contained learning modules group the application capabilities into teachable topics. Work through them in order or jump to the area you want to explore.

# Module A — Data Ingestion & Preparation
dashboard.module.a.title=A \u2014 Ingestion \u0026 Preparation
dashboard.module.a.learn=What you will understand here: how images enter the system, how duplicates are detected, and how the async pipeline processes each image step-by-step.
dashboard.module.a.desc=Upload images and observe every processing stage from queuing to completion. Covers pipeline parallelism, duplicate detection, and preview generation.
dashboard.module.a.goto.upload=Upload Images
dashboard.module.a.goto.pipeline=Pipeline Monitor

# Module B — Analysis & Enrichment
dashboard.module.b.title=B \u2014 Analysis \u0026 Enrichment
dashboard.module.b.learn=What you will understand here: what the Vision model extracts per image, how primary and secondary categories are assigned, how confidence scores influence quality, and how reprocessing works.
dashboard.module.b.desc=Browse the image archive and inspect Vision-model output: descriptions, categories, risk levels, OCR text, and category confidence. Trigger reprocessing to observe how model changes affect results.
dashboard.module.b.goto.overview=Image Archive

# Module C — Retrieval & Search
dashboard.module.c.title=C \u2014 Retrieval \u0026 Search
dashboard.module.c.learn=What you will understand here: how vector similarity search, BM25 keyword search, and hybrid RRF fusion work together to rank results, and how query formulation affects retrieval quality.
dashboard.module.c.desc=Run semantic, keyword, and hybrid queries. Compare result rankings and scores. Explore how the same query phrase retrieves different results depending on the retrieval mode.
dashboard.module.c.goto.search=Semantic / Keyword Search
dashboard.module.c.goto.multimodal=Multimodal Search

# Module D — Search Tuning Lab
dashboard.module.d.title=D \u2014 Search Tuning Lab
dashboard.module.d.learn=What you will understand here: how RRF weights, similarity functions, and score thresholds influence ranking, and how feedback signals shift result ordering.
dashboard.module.d.desc=Adjust retrieval parameters interactively. Compare cosine vs dot-product vs euclidean similarity. Use the why-not-found diagnostic to trace why specific images do not surface for a given query.
dashboard.module.d.goto.tuning=Search Tuning Lab

# Module E — Taxonomy & Category Governance
dashboard.module.e.title=E \u2014 Taxonomy \u0026 Governance
dashboard.module.e.learn=What you will understand here: how the category hierarchy is structured, how AI-suggested taxonomy changes are reviewed and applied, and how cluster discovery helps refine the category space.
dashboard.module.e.desc=Manage the image category taxonomy. Review AI-generated reclassification, alias, and deprecation suggestions. Use cluster discovery to identify emergent groupings and propose new categories.
dashboard.module.e.goto.taxonomy=Taxonomy Maintenance

# Module F — Migration & Lifecycle
dashboard.module.f.title=F \u2014 Migration \u0026 Lifecycle
dashboard.module.f.learn=What you will understand here: how prompt versions are managed and activated, how bulk reprocessing updates the archive, and how images move through the active/archived/deleted lifecycle.
dashboard.module.f.desc=Manage prompt templates and activate new versions. Run bulk reprocessing with diff comparison. Archive, restore, or permanently delete images. Inspect the audit log for full provenance.
dashboard.module.f.goto.migration=Migration Center
dashboard.module.f.goto.archive=Archive

# ── Recommended Learning Sequence ─────────────────────────────────────────────
dashboard.sequence.title=Recommended Learning Sequence
dashboard.sequence.desc=Work through the steps in this order for a complete end-to-end understanding of the Image RAG system. Each step builds on the previous one.
dashboard.sequence.step1=Upload a set of images (Module A \u2014 Upload)
dashboard.sequence.step2=Monitor each processing stage in the Pipeline view
dashboard.sequence.step3=Browse the classified results in the Image Archive
dashboard.sequence.step4=Run your first semantic search query
dashboard.sequence.step5=Run the same query as a BM25 keyword search and compare
dashboard.sequence.step6=Use Multimodal Search to combine image and text queries
dashboard.sequence.step7=Open the Search Tuning Lab and adjust RRF weights
dashboard.sequence.step8=Use why-not-found to trace a missed image
dashboard.sequence.step9=Review and apply AI taxonomy suggestions
dashboard.sequence.step10=Explore the Migration Center \u2014 activate a new prompt and reprocess

# ── Guided Experiments ─────────────────────────────────────────────────────────
dashboard.experiments.title=Guided Experiments
dashboard.experiments.desc=Each experiment is a focused hands-on exercise designed to make a specific Image RAG behavior visible. Run them in any order.

dashboard.experiment.compare.title=Compare Semantic vs BM25
dashboard.experiment.compare.goal=Learning goal: Observe how vector similarity and keyword overlap produce different ranked results for the same query.
dashboard.experiment.compare.desc=Enter the same query in semantic and keyword mode side-by-side. Note which images appear in one result set but not the other, and why their scores differ.
dashboard.experiment.compare.goto=Open Multimodal Search

dashboard.experiment.wnf.title=Why Was This Image Not Found?
dashboard.experiment.wnf.goal=Learning goal: Understand which filters, thresholds, or index gaps caused a known image to be missing from search results.
dashboard.experiment.wnf.desc=Choose a specific image and a query that should have matched it. The why-not-found diagnostic explains exactly why the result was excluded.
dashboard.experiment.wnf.goto=Open Search Tuning Lab

dashboard.experiment.reprocess.title=Change a Prompt \u0026 Observe the Diff
dashboard.experiment.reprocess.goal=Learning goal: See concretely how prompt wording changes the Vision model output and how that propagates to categories and search results.
dashboard.experiment.reprocess.desc=Edit a prompt draft in the Migration Center, run a test against a single image, activate the new prompt version, then reprocess an image and review the before/after diff.
dashboard.experiment.reprocess.goto=Open Migration Center

dashboard.experiment.taxonomy.title=Explore Cluster Discovery
dashboard.experiment.taxonomy.goal=Learning goal: Understand how clustering reveals implicit groupings in the image set and how that drives taxonomy evolution.
dashboard.experiment.taxonomy.desc=Run a cluster analysis in the Taxonomy Maintenance view. Inspect the dominant categories per cluster and decide whether to accept AI-generated reclassification suggestions.
dashboard.experiment.taxonomy.goto=Open Taxonomy

dashboard.experiment.feedback.title=Observe Feedback-Driven Re-ranking
dashboard.experiment.feedback.goal=Learning goal: See how positive and negative feedback signals shift the position of individual images in the ranked result list.
dashboard.experiment.feedback.desc=Run a query in the Search Tuning Lab, give thumbs-up and thumbs-down signals to specific results, and re-run the query to observe how the ranking changes.
dashboard.experiment.feedback.goto=Open Search Tuning Lab
