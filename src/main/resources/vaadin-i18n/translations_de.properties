dashboard.arch.desc.search=RRF-Fusion vereint semantische und Keyword-Scores
dashboard.arch.desc.result=Top-k-Ergebnisse mit Herkunft zur\u00fcckgegeben

# ── Trainingsmodule ────────────────────────────────────────────────────────────
dashboard.modules.title=Trainingsmodule
dashboard.modules.desc=Sechs eigenst\u00e4ndige Lernmodule gliedern die Anwendungsf\u00e4higkeiten in lehrbare Themen. Arbeiten Sie sie der Reihe nach durch oder springen Sie zu dem Bereich, den Sie erkunden m\u00f6chten.

# Modul A \u2014 Datenaufnahme & Vorbereitung
dashboard.module.a.title=A \u2014 Aufnahme \u0026 Vorbereitung
dashboard.module.a.learn=Was Sie hier verstehen werden: Wie Bilder ins System gelangen, wie Duplikate erkannt werden und wie die asynchrone Pipeline jedes Bild schrittweise verarbeitet.
dashboard.module.a.desc=Bilder hochladen und jede Verarbeitungsstufe von der Warteschlange bis zum Abschluss beobachten. Behandelt Pipeline-Parallelit\u00e4t, Duplikaterkennung und Vorschaugenerierung.
dashboard.module.a.goto.upload=Bilder hochladen
dashboard.module.a.goto.pipeline=Pipeline-Monitor

# Modul B \u2014 Analyse & Anreicherung
dashboard.module.b.title=B \u2014 Analyse \u0026 Anreicherung
dashboard.module.b.learn=Was Sie hier verstehen werden: Was das Vision-Modell je Bild extrahiert, wie Prim\u00e4r- und Sekund\u00e4rkategorien zugewiesen werden, wie Konfidenzwerte die Qualit\u00e4t beeinflussen und wie Neuverarbeitung funktioniert.
dashboard.module.b.desc=Das Bildarchiv durchsuchen und Vision-Modell-Ausgaben pr\u00fcfen: Beschreibungen, Kategorien, Risikostufen, OCR-Text und Kategoriekonfidenz. Neuverarbeitung anstoßen, um zu beobachten, wie Modelland\u00e4nderungen Ergebnisse ver\u00e4ndern.
dashboard.module.b.goto.overview=Bildarchiv

# Modul C \u2014 Retrieval & Suche
dashboard.module.c.title=C \u2014 Retrieval \u0026 Suche
dashboard.module.c.learn=Was Sie hier verstehen werden: Wie Vektorsimilarit\u00e4tssuche, BM25-Keyword-Suche und hybride RRF-Fusion zusammenspielen, um Ergebnisse zu ranken, und wie Anfrageformulierung die Qualit\u00e4t beeinflusst.
dashboard.module.c.desc=Semantische, Keyword- und hybride Anfragen ausf\u00fchren. Ergebnis-Rankings und Scores vergleichen. Erkunden, wie dieselbe Anfrage je nach Suchmodus unterschiedliche Ergebnisse liefert.
dashboard.module.c.goto.search=Semantische / Keyword-Suche
dashboard.module.c.goto.multimodal=Multimodale Suche

# Modul D \u2014 Suchoptimierungslabor
dashboard.module.d.title=D \u2014 Suchoptimierungslabor
dashboard.module.d.learn=Was Sie hier verstehen werden: Wie RRF-Gewichte, \u00c4hnlichkeitsfunktionen und Score-Schwellenwerte das Ranking beeinflussen und wie Feedback-Signale die Ergebnisreihenfolge verschieben.
dashboard.module.d.desc=Retrieval-Parameter interaktiv anpassen. Kosinus- vs. Dot-Product- vs. Euklidische \u00c4hnlichkeit vergleichen. Die Warum-nicht-gefunden-Diagnose nutzen, um herauszufinden, warum bestimmte Bilder bei einer Anfrage nicht auftauchen.
dashboard.module.d.goto.tuning=Suchoptimierungslabor

# Modul E \u2014 Taxonomie & Kategorie-Governance
dashboard.module.e.title=E \u2014 Taxonomie \u0026 Governance
dashboard.module.e.learn=Was Sie hier verstehen werden: Wie die Kategoriehierarchie aufgebaut ist, wie KI-generierte Taxonomie\u00e4nderungen gepr\u00fcft und angewendet werden, und wie Cluster-Discovery die Kategorielandschaft verfeinert.
dashboard.module.e.desc=Die Bildkategorien-Taxonomie verwalten. KI-generierte Umklassifizierungs-, Alias- und Deprecation-Vorschl\u00e4ge pr\u00fcfen. Cluster-Discovery nutzen, um emergente Gruppierungen zu identifizieren und neue Kategorien vorzuschlagen.
dashboard.module.e.goto.taxonomy=Taxonomiepflege

# Modul F \u2014 Migration & Lebenszyklus
dashboard.module.f.title=F \u2014 Migration \u0026 Lebenszyklus
dashboard.module.f.learn=Was Sie hier verstehen werden: Wie Prompt-Versionen verwaltet und aktiviert werden, wie Massenverarbeitung das Archiv aktualisiert, und wie Bilder durch den aktiven/archivierten/gel\u00f6schten Lebenszyklus laufen.
dashboard.module.f.desc=Prompt-Templates verwalten und neue Versionen aktivieren. Massenverarbeitung mit Diff-Vergleich ausf\u00fchren. Bilder archivieren, wiederherstellen oder dauerhaft l\u00f6schen. Das Audit-Log f\u00fcr vollst\u00e4ndige Herkunftsnachverfolgung einsehen.
dashboard.module.f.goto.migration=Migrations-Center
dashboard.module.f.goto.archive=Archiv

# ── Empfohlene Lernsequenz ─────────────────────────────────────────────────────
dashboard.sequence.title=Empfohlene Lernsequenz
dashboard.sequence.desc=Arbeiten Sie die Schritte in dieser Reihenfolge durch, um das Image-RAG-System vollst\u00e4ndig zu verstehen. Jeder Schritt baut auf dem vorherigen auf.
dashboard.sequence.step1=Eine Bildmenge hochladen (Modul A \u2014 Upload)
dashboard.sequence.step2=Jede Verarbeitungsstufe in der Pipeline-Ansicht beobachten
dashboard.sequence.step3=Die klassifizierten Ergebnisse im Bildarchiv durchsuchen
dashboard.sequence.step4=Die erste semantische Suchanfrage ausf\u00fchren
dashboard.sequence.step5=Dieselbe Anfrage als BM25-Keyword-Suche ausf\u00fchren und vergleichen
dashboard.sequence.step6=Multimodale Suche nutzen, um Bild- und Textanfragen zu kombinieren
dashboard.sequence.step7=Suchoptimierungslabor \u00f6ffnen und RRF-Gewichte anpassen
dashboard.sequence.step8=Warum-nicht-gefunden nutzen, um ein \u00fcbersehenes Bild nachzuverfolgen
dashboard.sequence.step9=KI-Taxonomievorschl\u00e4ge pr\u00fcfen und anwenden
dashboard.sequence.step10=Migrations-Center erkunden \u2014 neuen Prompt aktivieren und neu verarbeiten

# ── Gef\u00fchrte Experimente ───────────────────────────────────────────────────────
dashboard.experiments.title=Gef\u00fchrte Experimente
dashboard.experiments.desc=Jedes Experiment ist eine fokussierte praktische \u00dcbung, die ein bestimmtes Image-RAG-Verhalten sichtbar macht. F\u00fchren Sie sie in beliebiger Reihenfolge durch.

dashboard.experiment.compare.title=Semantisch vs. BM25 vergleichen
dashboard.experiment.compare.goal=Lernziel: Beobachten, wie Vektorsimilarit\u00e4t und Keyword-\u00dcberlappung f\u00fcr dieselbe Anfrage unterschiedliche Ergebnisse erzeugen.
dashboard.experiment.compare.desc=Dieselbe Anfrage im semantischen und Keyword-Modus nebeneinander eingeben. Notieren, welche Bilder in einem Ergebnissatz, aber nicht im anderen erscheinen und warum die Scores abweichen.
dashboard.experiment.compare.goto=Multimodale Suche \u00f6ffnen

dashboard.experiment.wnf.title=Warum wurde dieses Bild nicht gefunden?
dashboard.experiment.wnf.goal=Lernziel: Verstehen, welche Filter, Schwellenwerte oder Index-L\u00fccken dazu gef\u00fchrt haben, dass ein bekanntes Bild in den Suchergebnissen fehlt.
dashboard.experiment.wnf.desc=Ein bestimmtes Bild und eine Anfrage w\u00e4hlen, die es h\u00e4tte treffen sollen. Die Warum-nicht-gefunden-Diagnose erkl\u00e4rt genau, warum das Ergebnis ausgeschlossen wurde.
dashboard.experiment.wnf.goto=Suchoptimierungslabor \u00f6ffnen

dashboard.experiment.reprocess.title=Prompt \u00e4ndern \u0026 Diff beobachten
dashboard.experiment.reprocess.goal=Lernziel: Konkret sehen, wie Prompt-Formulierung die Vision-Modell-Ausgabe ver\u00e4ndert und wie sich das auf Kategorien und Suchergebnisse auswirkt.
dashboard.experiment.reprocess.desc=Einen Prompt-Entwurf im Migrations-Center bearbeiten, gegen ein einzelnes Bild testen, die neue Prompt-Version aktivieren, ein Bild neu verarbeiten und das Vorher-/Nachher-Diff pr\u00fcfen.
dashboard.experiment.reprocess.goto=Migrations-Center \u00f6ffnen

dashboard.experiment.taxonomy.title=Cluster-Discovery erkunden
dashboard.experiment.taxonomy.goal=Lernziel: Verstehen, wie Clustering implizite Gruppierungen im Bildbestand aufdeckt und wie das die Taxonomieentwicklung antreibt.
dashboard.experiment.taxonomy.desc=Eine Cluster-Analyse in der Taxonomiepflege-Ansicht ausf\u00fchren. Die dominanten Kategorien je Cluster pr\u00fcfen und entscheiden, ob KI-generierte Umklassifizierungsvorschl\u00e4ge \u00fcbernommen werden sollen.
dashboard.experiment.taxonomy.goto=Taxonomie \u00f6ffnen

dashboard.experiment.feedback.title=Feedback-gesteuertes Re-Ranking beobachten
dashboard.experiment.feedback.goal=Lernziel: Sehen, wie positive und negative Feedback-Signale die Position einzelner Bilder in der Ergebnisliste verschieben.
dashboard.experiment.feedback.desc=Eine Anfrage im Suchoptimierungslabor ausf\u00fchren, Daumen-hoch und Daumen-runter f\u00fcr bestimmte Ergebnisse vergeben und die Anfrage erneut ausf\u00fchren, um die ver\u00e4nderte Reihenfolge zu beobachten.
dashboard.experiment.feedback.goto=Suchoptimierungslabor \u00f6ffnen
